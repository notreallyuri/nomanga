[package]
name = "nomanga-services"
version = "0.1.0"
edition = "2024"

[features]
typescript = ["dep:specta"]

[dependencies]
nomanga-core = { path = "../core" }

serde = { workspace = true }
serde_json = { workspace = true }
tokio = { version = "1", features = ["rt", "macros"] }
thiserror = "2"

chrono = { version = "0.4", features = ["serde"]}
uuid = { version = "1", features = ["v4"] }


sqlx = { version = "0.9", features = ["runtime-tokio", "sqlite", "macros", "migrate", "chrono"] }
specta = { version = "2.0.0-rc.25", features = ["chrono", "function", "derive"], optional = true }
